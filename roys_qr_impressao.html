<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;font-family:Arial,sans-serif;padding:20px;}
.art-wrap{position:relative;width:min(90vw,600px);height:min(90vw,600px);}
.bg{width:100%;height:100%;display:block;}
#qr-spot{position:absolute;
  /* QR placeholder center in 1254px image: ~527,588 size ~280px
     As percentages: left=(527-140)/1254=30.9%, top=(588-140)/1254=35.7%
     width=280/1254=22.3%, height=280/1254=22.3% */
  left:30.9%;top:35.7%;width:22.3%;height:22.3%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0);
}
#qr-spot img{width:92%;height:92%;border-radius:3px;display:block;}
.actions{margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{padding:14px 24px;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:Arial,sans-serif;display:flex;align-items:center;gap:8px;}
.btn-print{background:#EA1F27;color:#fff;}
.btn-save{background:#0767B1;color:#fff;}
.status{margin-top:12px;font-size:13px;color:rgba(255,255,255,.5);text-align:center;}
.tip{margin-top:10px;font-size:12px;color:rgba(255,255,255,.3);text-align:center;max-width:400px;line-height:1.5;}
canvas{display:none;}
@media print{
  body{background:white;padding:0;display:block;}
  .art-wrap{width:20cm;height:20cm;margin:0 auto;}
  #qr-spot{left:30.9%;top:35.7%;width:22.3%;height:22.3%;}
  .actions,.status,.tip{display:none;}
}
</style>

<canvas id="cv"></canvas>

<script>
const FORM_URL = 'https://infinitylabs83.github.io/npsroys/';
let qrLoaded = false;
let qrImgEl = null;

const srcs = [
  'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(FORM_URL) + '&ecc=H&format=png&margin=1',
  'https://quickchart.io/qr?size=400&text=' + encodeURIComponent(FORM_URL),
];

function tryLoad(i){
  if(i >= srcs.length){
    document.getElementById('qr-spot').innerHTML = '<div style="color:#E24B4A;font-size:12px;text-align:center;">Sem conexão.<br>Verifique a internet.</div>';
    document.getElementById('status').textContent = 'Erro ao carregar QR Code.';
    return;
  }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const spot = document.getElementById('qr-spot');
    spot.innerHTML = '';
    img.style.cssText = 'width:92%;height:92%;border-radius:3px;display:block;';
    spot.appendChild(img);
    qrImgEl = img;
    qrLoaded = true;
    document.getElementById('status').textContent = 'QR Code pronto! ✅  Arquivo 20cm × 20cm @ 300dpi';
  };
  img.onerror = () => tryLoad(i+1);
  img.src = srcs[i];
}
tryLoad(0);

function salvar(){
  if(!qrLoaded || !qrImgEl){alert('Aguarde o QR Code carregar.');return;}
  
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  
  // Build canvas at 300dpi (20cm = 2362px)
  const RES = 2362;
  const cv = document.getElementById('cv');
  cv.width = RES; cv.height = RES;
  const ctx = cv.getContext('2d');
  
  const bgImg = document.querySelector('.bg');
  try {
    ctx.drawImage(bgImg, 0, 0, RES, RES);
  } catch(e){
    // bg might have CORS issues too — draw white bg
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,RES,RES);
  }
  
  // QR position as percentage of image
  const pctL = 0.309, pctT = 0.357, pctS = 0.223;
  const qrX = Math.round(pctL * RES);
  const qrY = Math.round(pctT * RES);
  const qrS = Math.round(pctS * RES * 0.92);
  
  try {
    ctx.drawImage(qrImgEl, qrX + Math.round(pctS*RES*0.04), qrY + Math.round(pctS*RES*0.04), qrS, qrS);
  } catch(e){
    console.error('canvas draw error', e);
  }
  
  if(isIOS){
    // iOS: open canvas as image in new tab → user taps share → Save to Photos or Print
    cv.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const w = window.open(url, '_blank');
      document.getElementById('status').textContent = 'Imagem aberta em nova aba. Toque e segure para salvar ou imprimir.';
    }, 'image/png');
  } else {
    const link = document.createElement('a');
    link.download = 'roys_qr_impressao_20x20cm.png';
    link.href = cv.toDataURL('image/png');
    link.click();
  }
}
</script>
</body>
</html>
